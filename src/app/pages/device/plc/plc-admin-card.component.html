<ion-col size="12" size-md="6" size-lg="4" size-xl="3">
  <ion-card class="plc-card">

    <ion-card-header>
      <ion-card-title>
        <img src="assets/icons/plc-module.svg" class="icon" />
        {{ device()?.name }}
      </ion-card-title>

      <ion-card-subtitle>
        {{ device()?.ip }}:{{ device()?.port }}
      </ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <app-admin-plc [device]="device()"></app-admin-plc>
    </ion-card-content>

  </ion-card>
</ion-col>
