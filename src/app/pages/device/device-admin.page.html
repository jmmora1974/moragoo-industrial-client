<ion-header>
  <ion-toolbar>
    <app-header></app-header>
    <ion-title>Dispositivos</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
<ion-segment>
  <!-- PLANTILLA BASE DEL PLC -->
  

  <!-- CARD DINÁMICO DEL DRIVER -->
  <ion-grid id="gridContaines">
    
    <ion-row #driverContainer></ion-row>
  </ion-grid>
</ion-segment>
  <!-- Segmentos -->
  <ion-segment value="{{ segment() }}" (ionChange)="changeSegment($event)">
    <ion-segment-button value="info">INFORMACIÓN</ion-segment-button>
    <ion-segment-button value="driver">DRIVER</ion-segment-button>
    <ion-segment-button value="logs">LOGS</ion-segment-button>
  </ion-segment>

  @switch(segment()) {

    @case('info') {
      <ion-list>
        <ion-item>
          <ion-label>
            <h2>{{ device()?.name }}</h2>
            <p>IP: {{ device()?.ip }}</p>
            <p>Puerto: {{ device()?.port }}</p>
            <p>Driver: {{ device()?.driver }}</p>
            <p>Estado: {{ device()?.status }}</p>
          </ion-label>
        </ion-item>
      </ion-list>
    }

    @case('driver') {
      <!-- Aquí ya está el card dinámico -->
    }

    @case('logs') {
      <ion-list>
        <ion-item>
          <ion-label>Logs del dispositivo</ion-label>
        </ion-item>
      </ion-list>
    }

  }

</ion-content>
