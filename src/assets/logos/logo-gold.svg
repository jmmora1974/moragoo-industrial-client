<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img" aria-label="Moradoo logo">
  <defs>
    <linearGradient id="goldGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6e7b4"/>
      <stop offset="40%" stop-color="#e6c86a"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .brand { font-family: "Inter", "Segoe UI", Roboto, sans-serif; font-weight: 700; letter-spacing: 0.6px; }
      .tag { font-family: "Inter", "Segoe UI", Roboto, sans-serif; font-weight: 500; font-size: 12px; fill:#cfc7b0; }
    </style>
  </defs>

  <!-- Fondo transparente con sombra suave -->
  <g filter="url(#softShadow)">
    <!-- Engranaje dorado -->
    <g transform="translate(12,8) scale(0.9)">
      <path d="M36 4l4.8 2.8 2.6 5.2-1.2 6.1 3.9 4.2 6.1-0.4 4.8 3.6-1.6 6 2.8 5.2-4.4 4.4-5.6-1.6-5.6 2.4-0.8 6.4-6 2.4-5.2-3.2-5.2 3.2-6-2.4-0.8-6.4-5.6-2.4-5.6 1.6-4.4-4.4 2.8-5.2-1.6-6 4.8-3.6 6.1 0.4 3.9-4.2-1.2-6.1 2.6-5.2L36 4z"
            fill="url(#goldGrad)" stroke="#8a6a10" stroke-width="0.8" />
      <circle cx="36" cy="36" r="10" fill="#fff8e6" opacity="0.06"/>
      <circle cx="36" cy="36" r="8" fill="url(#goldGrad)" stroke="#8a6a10" stroke-width="0.8"/>
    </g>

    <!-- Texto Moradoo -->
    <g transform="translate(100,50)">
      <text x="0" y="-6" class="brand" font-size="28" fill="url(#goldGrad)" stroke="#6f4f08" stroke-width="0.4">Moradoo</text>
      <text x="0" y="14" class="tag">Industrial Device Manager</text>
    </g>
  </g>
</svg>
